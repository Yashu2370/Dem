<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Research Assistant</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#111827;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

textarea{
width:100%;
height:180px;
padding:12px;
font-size:14px;
}

button{
padding:10px 15px;
margin:6px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#1e40af;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.output{
margin-top:15px;
background:#fafafa;
padding:15px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<header>
<h1>🤖 AI Research Assistant for Engineering Libraries</h1>
<p>Summarize • Literature Review • Citation • Code Generation</p>
</header>

<div class="container">

<div class="card">

<h3>Enter Research Topic or Paper Text</h3>

<textarea id="inputText"></textarea>

<br>

<button onclick="summarize()">Summarize</button>
<button onclick="literature()">Literature Review</button>
<button onclick="citation()">Generate Citation</button>
<button onclick="explain()">Explain Topic</button>
<button onclick="generateCode()">Generate Code</button>

<div id="output" class="output"></div>

</div>

</div>

<script>

function getInput(){
return document.getElementById("inputText").value
}

function summarize(){

let text=getInput()

let words=text.split(" ").slice(0,80).join(" ")

document.getElementById("output").innerText=
"Research Summary:\n\n"+words+"..."

}

function literature(){

let topic=getInput()

document.getElementById("output").innerText=

"Literature Review for: "+topic+"\n\n"+
"1. Several studies highlight the role of AI in academic research.\n"+
"2. Digital libraries increasingly integrate machine learning for knowledge discovery.\n"+
"3. Generative AI improves research productivity by automating literature analysis.\n"+
"4. Universities adopt AI-powered research assistants.\n"+
"5. Future libraries will integrate AI-driven knowledge systems."

}

function citation(){

let topic=getInput()

document.getElementById("output").innerText=

"Example IEEE Citation:\n\n"+
"Author, 'Study on "+topic+
",' Journal of Artificial Intelligence Research, vol. 10, no. 2, pp. 120-130, 2024."

}

function explain(){

let topic=getInput()

document.getElementById("output").innerText=

"Topic Explanation:\n\n"+
topic+" refers to the application of modern computational techniques "+
"to analyze data, support research activities, and improve knowledge discovery in academic environments."

}

function generateCode(){

let topic=getInput()

document.getElementById("output").innerText=

"Example Python Code for "+topic+"\n\n"+
`import pandas as pd

data = {
 "topic": ["AI Research", "Generative AI", "Digital Libraries"],
 "year":[2022,2023,2024]
}

df = pd.DataFrame(data)

print(df)`
}

</script>

</body>
</html>
